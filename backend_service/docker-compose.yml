# THIS IS FOR LOCAL DEVELOPMENT
# DO NOT USE ACTUAL PASSWORDS PLS BRO
services:
  postgres:
    image: timescale/timescaledb-ha:cicd-e2f4bf5
    container_name: smiskis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smiskis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smiskis-backend
    restart: unless-stopped
    ports:
      - "8080:8080" # HTTP API
      - "8081:8081" # WebSocket (future)
    environment:
      HTTP_ADDR: ":8080"
      WS_ADDR: ":8081"
      DB_URL: "postgresql://postgres:postgres@postgres:5432/smiskis?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
